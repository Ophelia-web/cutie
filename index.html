<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chinchi Land · 南美栗鼠聊天站</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="sparkle-layer" aria-hidden="true">
      <span>✨</span><span>⭐</span><span>🌸</span><span>☁️</span><span>✨</span>
    </div>

    <main class="app-shell">
      <header class="hero-card">
        <p class="tag">软萌对话实验室</p>
        <h1>Chinchi Land</h1>
        <p class="subtitle">
          和一只超可爱的南美栗鼠聊天吧！<br />
          无需 API Key，使用免费本地模型（首次会下载模型文件）。
        </p>
      </header>

      <section class="chat-card" aria-label="聊天区域">
        <div class="chat-topbar">
          <div class="pet-avatar">🐭</div>
          <div>
            <h2>栗鼠小助手 Chichi</h2>
            <p id="modelStatus">模型准备中...</p>
          </div>
        </div>

        <div id="quickActions" class="quick-actions" aria-label="快捷问题">
          <button type="button" class="chip">今天心情不好，安慰我</button>
          <button type="button" class="chip">讲一个南美栗鼠小知识</button>
          <button type="button" class="chip">给我一个可爱早安祝福</button>
        </div>

        <div id="chatList" class="chat-list" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <input
            id="chatInput"
            type="text"
            maxlength="300"
            placeholder="输入你想和栗鼠说的话..."
            autocomplete="off"
            required
          />
          <button id="sendBtn" type="submit">发送</button>
        </form>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
